[pytest]
testpaths = tests
python_files = test_*.py
# `-m "not integration"` is the default to keep the unit-test path
# fast and offline. Integration tests need a real Batfish container
# reachable at $BATFISH_HOST:9996. Run them with `pytest -m integration`
# (or `pytest -m "integration or not integration"` to run everything).
addopts = -ra --strict-markers --tb=short -m "not integration"
markers =
    integration: tests that require a real Batfish container reachable at $BATFISH_HOST:9996
filterwarnings =
    ignore::DeprecationWarning:pybatfish
    ignore::DeprecationWarning:pandas
