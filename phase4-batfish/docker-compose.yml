---
# Batfish offline configuration analyzer.
#
# Runs as a single container on the netdevops services VM (the same
# host that runs the NetBox stack - reuses the existing Docker daemon,
# no new VM, no lab impact). The host IP / hostname is environment-
# specific and lives in evpn-lab-env/env.sh as $BATFISH_HOST. Nothing
# in this file or the rest of the project hardcodes it.
#
# No state is persisted - validate.py creates a fresh snapshot on
# every run, so the container is purely a stateless parser/analyzer
# service.
#
# One-time deployment (run on the netdevops services VM):
#   mkdir -p /opt/batfish && cd /opt/batfish
#   # copy this file here, then:
#   docker compose pull
#   docker compose up -d
#   docker compose ps        # confirm 'batfish' is Up
#
# Verification from a dev box:
#   source <repo-root>/../evpn-lab-env/env.sh
#   nc -zv "$BATFISH_HOST" 9996
#   nc -zv "$BATFISH_HOST" 9997
#
# Image: batfish/allinone is the official image from the Batfish
# project. It bundles the Batfish server (the Java service that does
# the actual config analysis) plus the example notebooks. We only use
# the server. ~1.5 GB pull, runs as a single JVM process inside the
# container.

services:
  batfish:
    image: batfish/allinone:latest
    container_name: batfish
    restart: unless-stopped
    ports:
      # 9996 = "coordinator" service (pybatfish.client.session.Session
      # connects here). 9997 = worker. Both must be exposed.
      - "9996:9996"
      - "9997:9997"
    # No volume mounts - snapshots are uploaded fresh by pybatfish on
    # every validate.py run. The container has its own /data tmpfs
    # area which Batfish uses for parse state, recreated each time.
    healthcheck:
      # Note: the batfish/allinone image does not ship `curl`, so we
      # check liveness by probing the coordinator's TCP listener with
      # bash's /dev/tcp pseudo-device. Coordinator is the JVM service
      # validate.py talks to.
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/127.0.0.1/9996' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 120s
