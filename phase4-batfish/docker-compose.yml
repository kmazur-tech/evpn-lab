---
# Batfish offline configuration analyzer.
#
# Runs as a single container on netdevops-srv (netdevops-srv.lab.local) alongside
# the existing NetBox stack. No state is persisted - validate.py creates
# a fresh snapshot on every run, so the container is purely a stateless
# parser/analyzer service.
#
# Deployment (one-time, on netdevops-srv):
#   ssh root@netdevops-srv.lab.local
#   mkdir -p /opt/batfish && cd /opt/batfish
#   # copy this docker-compose.yml here, then:
#   docker compose pull
#   docker compose up -d
#   docker compose ps        # confirm 'batfish' is Up
#
# Verification from WSL2 / dev box:
#   nc -zv netdevops-srv.lab.local 9996
#   nc -zv netdevops-srv.lab.local 9997
#
# Image: batfish/allinone is the official image from the Batfish project.
# It bundles the Batfish server (the Java service that does the actual
# config analysis) plus the example notebooks. We only use the server.
# ~1.5 GB pull, runs as a single JVM process inside the container.

services:
  batfish:
    image: batfish/allinone:latest
    container_name: batfish
    restart: unless-stopped
    ports:
      # 9996 = "coordinator" service (pybatfish.client.session.Session
      # connects here). 9997 = worker. Both must be exposed.
      - "9996:9996"
      - "9997:9997"
    # No volume mounts - snapshots are uploaded fresh by pybatfish on
    # every validate.py run. The container has its own /data tmpfs
    # area which Batfish uses for parse state, recreated each time.
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9996/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
