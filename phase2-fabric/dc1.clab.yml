# DC1 EVPN-VXLAN Fabric - Containerlab Topology
#
# 2x spine + 2x leaf (Juniper vJunos-switch, EX9214)
# 4x host (Linux containers)
#
# vjunos-switch interface mapping: eth1=ge-0/0/0, eth2=ge-0/0/1, etc.
# Management via br-clab bridge (env-specific, see .env.example)
#
# After deploy, run: bash setup-hosts.sh
# (configures IPs and 802.3ad bonding on hosts; gateway ARP is learned
# dynamically via EVPN ARP suppression on the leaves, no static ARP needed)

name: dc1

mgmt:
  bridge: ${CLAB_BRIDGE:-br-clab}
  ipv4-subnet: ${MGMT_SUBNET}
  ipv4-gw: ${MGMT_GATEWAY}

topology:

  defaults:
    labels:
      project: evpn-lab
      phase: "2"

  kinds:
    juniper_vjunosswitch:
      image: vrnetlab/juniper_vjunos-switch:23.2R1.14
    linux:
      image: alpine:latest

  nodes:

    # Spines
    dc1-spine1:
      kind: juniper_vjunosswitch
      mgmt-ipv4: ${CLAB_IP_dc1_spine1}
      startup-config: configs/dc1-spine1.conf

    dc1-spine2:
      kind: juniper_vjunosswitch
      mgmt-ipv4: ${CLAB_IP_dc1_spine2}
      startup-config: configs/dc1-spine2.conf

    # Leaves
    dc1-leaf1:
      kind: juniper_vjunosswitch
      mgmt-ipv4: ${CLAB_IP_dc1_leaf1}
      startup-config: configs/dc1-leaf1.conf

    dc1-leaf2:
      kind: juniper_vjunosswitch
      mgmt-ipv4: ${CLAB_IP_dc1_leaf2}
      startup-config: configs/dc1-leaf2.conf

    # Hosts (configured by setup-hosts.sh after deploy)
    # Mgmt IPs come from env vars - same pattern as the spine/leaf
    # CLAB_IP_* references above. See ../../evpn-lab-env/env.sh.
    dc1-host1:
      kind: linux
      mgmt-ipv4: ${CLAB_IP_dc1_host1}

    dc1-host2:
      kind: linux
      mgmt-ipv4: ${CLAB_IP_dc1_host2}

    dc1-host3:
      kind: linux
      mgmt-ipv4: ${CLAB_IP_dc1_host3}

    dc1-host4:
      kind: linux
      mgmt-ipv4: ${CLAB_IP_dc1_host4}

  links:

    # Spine-leaf fabric (full mesh)
    # dc1-spine1 ge-0/0/0 <-> dc1-leaf1  ge-0/0/0  (10.1.4.0/31)
    - endpoints: ["dc1-spine1:eth1", "dc1-leaf1:eth1"]
    # dc1-spine1 ge-0/0/1 <-> dc1-leaf2  ge-0/0/0  (10.1.4.2/31)
    - endpoints: ["dc1-spine1:eth2", "dc1-leaf2:eth1"]
    # dc1-spine2 ge-0/0/0 <-> dc1-leaf1  ge-0/0/1  (10.1.4.4/31)
    - endpoints: ["dc1-spine2:eth1", "dc1-leaf1:eth2"]
    # dc1-spine2 ge-0/0/1 <-> dc1-leaf2  ge-0/0/1  (10.1.4.6/31)
    - endpoints: ["dc1-spine2:eth2", "dc1-leaf2:eth2"]

    # Host - single-homed
    # dc1-leaf1 ge-0/0/2 <-> dc1-host1 eth1
    - endpoints: ["dc1-leaf1:eth3", "dc1-host1:eth1"]
    # dc1-leaf2 ge-0/0/2 <-> dc1-host2 eth1
    - endpoints: ["dc1-leaf2:eth3", "dc1-host2:eth1"]

    # Host - dual-homed (ESI-LAG)
    # dc1-leaf1 ge-0/0/3 <-> dc1-host3 eth1
    - endpoints: ["dc1-leaf1:eth4", "dc1-host3:eth1"]
    # dc1-leaf2 ge-0/0/3 <-> dc1-host3 eth2
    - endpoints: ["dc1-leaf2:eth4", "dc1-host3:eth2"]
    # dc1-leaf1 ge-0/0/4 <-> dc1-host4 eth1
    - endpoints: ["dc1-leaf1:eth5", "dc1-host4:eth1"]
    # dc1-leaf2 ge-0/0/4 <-> dc1-host4 eth2
    - endpoints: ["dc1-leaf2:eth5", "dc1-host4:eth2"]
