    ge-0/0/1 {
        description "to dc1-spine2";
        mtu 9192;
        unit 0 {
            family inet {
                address 10.1.4.5/31;
            }
        }
    }
    ge-0/0/2 {
        mtu 9192;
        unit 0 {
            family ethernet-switching {
                interface-mode access;
                vlan {
                    members VLAN10;
                }
            }
        }
    }
    ge-0/0/3 {
        ether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/4 {
        ether-options {
            802.3ad ae1;
        }
    }
    ae0 {
        mtu 9192;
        esi {
            auto-derive {
                lacp-pe-system-id-and-admin-key;
            }
            all-active;
        }
        aggregated-ether-options {
            lacp {
                active;
                periodic fast;
                system-id 00:00:00:00:03:00;
                admin-key 1;
