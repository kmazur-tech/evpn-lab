interfaces {
    ge-0/0/0 {
        description "to dc1-spine1";
        mtu 9192;
        unit 0 {
            family inet {
                address 10.1.4.1/31;
            }
        }
    }
    ge-0/0/1 {
        description "to dc1-spine2";
        mtu 9192;
        unit 0 {
            family inet {
                address 10.1.4.5/31;
            }
        }
    }
    ge-0/0/2 {
        mtu 9192;
    }
    ge-0/0/3 {
        mtu 9192;
    }
    ge-0/0/4 {
        mtu 9192;
    }
    fxp0 {
        unit 0 {
            family inet {
                address 10.0.0.15/24;
            }
            family inet6 {
                address 2001:db8::2/64;
            }
        }
    }
    irb {
        unit 10 {
            description "VLAN 10 anycast GW";
            family inet {
                address 10.10.10.1/24;
            }
            mac 00:00:5e:00:01:01;
        }
        unit 20 {
            description "VLAN 20 anycast GW";
            family inet {
                address 10.10.20.1/24;
            }
            mac 00:00:5e:00:01:01;
        }
    }
    lo0 {
        unit 1 {
            description "Router-ID / VTEP";
            family inet {
                address 10.1.0.3/32;
            }
        }
        unit 2 {
            description "VRF TENANT-1";
            family inet {
                address 10.1.1.3/32;
            }
        }
    }
}
forwarding-options {
    storm-control-profiles sc-default {
        all;
    }
}
policy-options {
    policy-statement EXPORT-LOOPBACK {
        term 1 {
            from interface lo0.1;
            then accept;
        }
        term 2 {
            then reject;
        }
    }
}
routing-instances {
    EVPN-VXLAN {
        instance-type virtual-switch;
        protocols {
            evpn {
                encapsulation vxlan;
                default-gateway no-gateway-community;
                duplicate-mac-detection {
                    detection-threshold 5;
                    detection-window 180;
                    auto-recovery-time 5;
                }
                extended-vni-list [ 10010 10020 ];
                multicast-mode ingress-replication;
            }
        }
        vtep-source-interface lo0.1;
        route-distinguisher 10.1.0.3:100;
        vrf-target target:65000:100;
        vlans {
            VLAN10 {
                vlan-id 10;
                l3-interface irb.10;
                no-arp-suppression;
                vxlan {
                    vni 10010;
                }
            }
            VLAN20 {
                vlan-id 20;
                l3-interface irb.20;
                no-arp-suppression;
                vxlan {
                    vni 10020;
                }
            }
        }
    }
    TENANT-1 {
        instance-type vrf;
        routing-options {
            multipath;
            auto-export;
        }
        protocols {
            evpn {
                ip-prefix-routes {
                    advertise direct-nexthop;
                    encapsulation vxlan;
                    vni 5000;
                }
            }
        }
        interface irb.10;
        interface irb.20;
        interface lo0.2;
        route-distinguisher 10.1.0.3:5000;
        vrf-target target:65000:5000;
        vrf-table-label;
    }
    mgmt_junos {
        routing-options {
            rib mgmt_junos.inet6.0 {
                static {
                    route ::/0 next-hop 2001:db8::1;
                }
            }
            static {
                route 0.0.0.0/0 next-hop 10.0.0.2;
            }
        }
    }
}
routing-options {
    router-id 10.1.0.3;
    forwarding-table {
        chained-composite-next-hop {
            ingress {
                evpn;
            }
        }
    }
}
protocols {
    bgp {
        group UNDERLAY {
            type external;
            family inet {
                unicast;
            }
            export EXPORT-LOOPBACK;
            local-as 65003;
            multipath {
                multiple-as;
            }
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
                session-mode single-hop;
            }
            neighbor 10.1.4.0 {
                peer-as 65001;
            }
            neighbor 10.1.4.4 {
                peer-as 65002;
            }
        }
        group OVERLAY {
            type internal;
            multihop {
                ttl 2;
                no-nexthop-change;
            }
            local-address 10.1.0.3;
            family evpn {
                signaling {
                    loops 2;
                }
            }
            local-as 65000;
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
                session-mode automatic;
            }
            neighbor 10.1.0.1;
            neighbor 10.1.0.2;
            vpn-apply-export;
        }
        mtu-discovery;
        log-updown;
        graceful-restart {
            dont-help-shared-fate-bfd-down;
        }
    }
    network-isolation {
        group EVPN-CORE {
            detection {
                hold-time up 60;
                service-tracking {
                    core-isolation;
                }
            }
            service-tracking-action link-down;
        }
    }
    lldp {
        port-id-subtype interface-name;
        interface all;
    }
}
