forwarding-options {
    storm-control-profiles sc-default {
        all;
    }
}
policy-options {
    policy-statement EXPORT-LOOPBACK {
        term 1 {
            from interface lo0.1;
            then accept;
        }
        term 2 {
            then reject;
        }
    }
    policy-statement LOAD-BALANCE {
        then {
            load-balance per-packet;
        }
    }
    community TENANT-1-RT members target:65000:5000;
    community FABRIC-TENANT-RT-RANGE members "target:65000:5...";
    policy-statement EVPN-IMPORT-TENANT-1 {
        term tenant-1 {
            from community TENANT-1-RT;
            then accept;
        }
        term reject {
            then reject;
        }
    }
    policy-statement EVPN-EXPORT-TENANT-1 {
        term tag-and-accept {
            then {
                community add TENANT-1-RT;
                accept;
            }
        }
    }
    policy-statement TENANT-1-T5-EXPORT {
        term tenant-subnets {
            from {
                route-filter 10.10.10.0/24 exact;
                route-filter 10.10.20.0/24 exact;
            }
            then accept;
        }
        term reject {
            then reject;
        }
    }
    policy-statement TENANT-1-T5-IMPORT {
        term tenant-subnets {
            from {
                route-filter 10.10.10.0/24 exact;
                route-filter 10.10.20.0/24 exact;
            }
            then accept;
        }
        term reject {
            then reject;
        }
    }
}
routing-instances {
    EVPN-VXLAN {
        instance-type mac-vrf;
        protocols {
            evpn {
                encapsulation vxlan;
                default-gateway no-gateway-community;
                duplicate-mac-detection {
                    detection-threshold 5;
                    detection-window 180;
                    auto-recovery-time 5;
                }
                extended-vni-list [ 10010 10020 ];
                multicast-mode ingress-replication;
            }
        }
        vtep-source-interface lo0.1;
        service-type vlan-aware;
        interface ge-0/0/2.0;
        interface ae0.0;
        interface ae1.0;
        route-distinguisher 10.1.0.3:1;
        vrf-import EVPN-IMPORT-TENANT-1;
        vrf-export EVPN-EXPORT-TENANT-1;
        vlans {
            VLAN10 {
                vlan-id 10;
                l3-interface irb.10;
                vxlan {
                    vni 10010;
                }
            }
            VLAN20 {
                vlan-id 20;
                l3-interface irb.20;
                vxlan {
                    vni 10020;
                }
            }
        }
    }
    TENANT-1 {
        instance-type vrf;
        routing-options {
            multipath;
            auto-export;
        }
        protocols {
            evpn {
                ip-prefix-routes {
                    advertise direct-nexthop;
                    encapsulation vxlan;
                    vni 5000;
                    export TENANT-1-T5-EXPORT;
                    import TENANT-1-T5-IMPORT;
                }
            }
        }
        interface irb.10;
        interface irb.20;
        interface lo0.2;
        route-distinguisher 10.1.0.3:5000;
        vrf-import EVPN-IMPORT-TENANT-1;
        vrf-export EVPN-EXPORT-TENANT-1;
        vrf-table-label;
    }
    mgmt_junos {
        routing-options {
            rib mgmt_junos.inet6.0 {
                static {
                    route ::/0 next-hop 2001:db8::1;
                }
            }
            static {
                route 0.0.0.0/0 next-hop 10.0.0.2;
            }
        }
    }
}
routing-options {
    router-id 10.1.0.3;
    graceful-restart;
    forwarding-table {
        export LOAD-BALANCE;
        chained-composite-next-hop {
            ingress {
                evpn;
            }
        }
    }
}
protocols {
    bgp {
        group UNDERLAY {
            type external;
            family inet {
                unicast;
            }
            export EXPORT-LOOPBACK;
            hold-time 30;
            local-as 65003;
            multipath {
                multiple-as;
            }
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
                session-mode single-hop;
            }
            neighbor 10.1.4.0 {
                peer-as 65001;
            }
            neighbor 10.1.4.4 {
                peer-as 65002;
            }
        }
        group OVERLAY {
            type internal;
            multihop {
                ttl 2;
                no-nexthop-change;
            }
            local-address 10.1.0.3;
            family evpn {
                signaling {
                    loops 2;
                }
            }
            hold-time 30;
            local-as 65000;
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
                session-mode automatic;
            }
            neighbor 10.1.0.1;
            neighbor 10.1.0.2;
        }
        mtu-discovery;
        log-updown;
        graceful-restart {
            dont-help-shared-fate-bfd-down;
        }
    }
    network-isolation {
        group EVPN-CORE {
            detection {
                hold-time up 60;
                service-tracking {
                    core-isolation;
                }
            }
            service-tracking-action link-down;
        }
    }
    lldp {
        port-id-subtype interface-name;
        interface all;
    }
}
