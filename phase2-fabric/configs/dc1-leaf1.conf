            family inet {
                address 10.0.0.15/24;
            }
            family inet6 {
                address 2001:db8::2/64;
            }
        }
    }
    irb {
        unit 10 {
            virtual-gateway-accept-data;
            family inet {
                mtu 9000;
                no-redirects;
                address 10.10.10.3/24 {
