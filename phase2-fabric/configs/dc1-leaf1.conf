                }
            }
            virtual-gateway-v4-mac 00:00:5e:00:01:01;
        }
        unit 20 {
            virtual-gateway-accept-data;
            family inet {
                mtu 9000;
                no-redirects;
                address 10.10.20.3/24 {
                    virtual-gateway-address 10.10.20.1;
                }
            }
            virtual-gateway-v4-mac 00:00:5e:00:01:01;
        }
