    ae1 {
        mtu 9192;
        esi {
            auto-derive {
                lacp-pe-system-id-and-admin-key;
            }
            all-active;
        }
        aggregated-ether-options {
            lacp {
                active;
                periodic fast;
                system-id 00:00:00:00:04:00;
                admin-key 2;
            }
