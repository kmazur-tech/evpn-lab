## dc1-leaf1 - EVPN-VXLAN ERB leaf configuration
## Generated from test deployment, validated on vjunos-switch 23.2R1.14
## Note: fxp0, chassis, system sections are managed by vrnetlab init.conf
## Only the overlay/underlay config below needs to be in startup-config

interfaces {
    irb {
        unit 10 {
            description "VLAN 10 anycast GW";
            family inet {
                address 10.10.10.1/24;
            }
            mac 00:00:5e:00:01:01;
        }
        unit 20 {
            description "VLAN 20 anycast GW";
            family inet {
                address 10.10.20.1/24;
            }
            mac 00:00:5e:00:01:01;
        }
    }
    lo0 {
        unit 1 {
            description "Router-ID / VTEP";
            family inet {
                address 10.1.0.3/32;
            }
        }
        unit 2 {
            description "VRF TENANT-1";
            family inet {
                address 10.1.1.3/32;
            }
        }
    }
}
policy-options {
    policy-statement EXPORT-LOOPBACK {
        term 1 {
            from interface lo0.1;
            then accept;
        }
        term 2 {
            then reject;
        }
    }
}
routing-instances {
    EVPN-VXLAN {
        instance-type virtual-switch;
        protocols {
            evpn {
                encapsulation vxlan;
                default-gateway no-gateway-community;
                extended-vni-list [ 10010 10020 ];
            }
        }
        vtep-source-interface lo0.1;
        route-distinguisher 10.1.0.3:100;
        vrf-target target:65000:100;
        vlans {
            VLAN10 {
                vlan-id 10;
                l3-interface irb.10;
                vxlan {
                    vni 10010;
                }
            }
            VLAN20 {
                vlan-id 20;
                l3-interface irb.20;
                vxlan {
                    vni 10020;
                }
            }
        }
    }
    TENANT-1 {
        instance-type vrf;
        routing-options {
            multipath;
            auto-export;
        }
        protocols {
            evpn {
                ip-prefix-routes {
                    advertise direct-nexthop;
                    encapsulation vxlan;
                    vni 5000;
                }
            }
        }
        interface irb.10;
        interface irb.20;
        interface lo0.2;
        route-distinguisher 10.1.0.3:5000;
        vrf-target target:65000:5000;
        vrf-table-label;
    }
}
routing-options {
    router-id 10.1.0.3;
}
protocols {
    bgp {
        group UNDERLAY {
            type external;
            family inet {
                unicast;
            }
            export EXPORT-LOOPBACK;
            local-as 65003;
            multipath;
            bfd-liveness-detection {
                minimum-interval 1000;
            }
        }
        group OVERLAY {
            type internal;
            multihop {
                ttl 2;
            }
            local-address 10.1.0.3;
            family evpn {
                signaling;
            }
            local-as 65000;
        }
    }
}
