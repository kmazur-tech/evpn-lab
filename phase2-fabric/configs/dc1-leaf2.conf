interfaces {
    ge-0/0/0 {
        description "to dc1-spine1";
        unit 0 {
            family inet {
                address 10.1.4.3/31;
            }
        }
    }
    ge-0/0/1 {
        description "to dc1-spine2";
        unit 0 {
            family inet {
                address 10.1.4.7/31;
            }
        }
    }
    fxp0 {
        unit 0 {
            family inet {
                address 10.0.0.15/24;
            }
            family inet6 {
                address 2001:db8::2/64;
            }
        }
    }
    irb {
        unit 10 {
            description "VLAN 10 anycast GW";
            family inet {
                address 10.10.10.1/24;
            }
            mac 00:00:5e:00:01:01;
        }
        unit 20 {
            description "VLAN 20 anycast GW";
            family inet {
                address 10.10.20.1/24;
            }
            mac 00:00:5e:00:01:01;
        }
    }
    lo0 {
        unit 1 {
            description "Router-ID / VTEP";
            family inet {
                address 10.1.0.4/32;
            }
        }
    }
}
policy-options {
    policy-statement EXPORT-LOOPBACK {
        term 1 {
            from interface lo0.1;
            then accept;
        }
        term 2 {
            then reject;
        }
    }
}
routing-instances {
    EVPN-VXLAN {
        instance-type virtual-switch;
        protocols {
            evpn {
                encapsulation vxlan;
                default-gateway no-gateway-community;
                extended-vni-list [ 10010 10020 ];
            }
        }
        vtep-source-interface lo0.1;
        route-distinguisher 10.1.0.4:100;
        vrf-target target:65000:100;
        vlans {
            VLAN10 {
                vlan-id 10;
                l3-interface irb.10;
                vxlan {
                    vni 10010;
                }
            }
            VLAN20 {
                vlan-id 20;
                l3-interface irb.20;
                vxlan {
                    vni 10020;
                }
            }
        }
    }
    TENANT-1 {
        instance-type vrf;
        routing-options {
            multipath;
            auto-export;
        }
        protocols {
            evpn {
                ip-prefix-routes {
                    advertise direct-nexthop;
                    encapsulation vxlan;
                    vni 5000;
                }
            }
        }
        interface irb.10;
        interface irb.20;
        route-distinguisher 10.1.0.4:5000;
        vrf-target target:65000:5000;
        vrf-table-label;
    }
    mgmt_junos {
        routing-options {
            rib mgmt_junos.inet6.0 {
                static {
                    route ::/0 next-hop 2001:db8::1;
                }
            }
            static {
                route 0.0.0.0/0 next-hop 10.0.0.2;
            }
        }
    }
}
routing-options {
    router-id 10.1.0.4;
}
protocols {
    bgp {
        group UNDERLAY {
            type external;
            family inet {
                unicast;
            }
            export EXPORT-LOOPBACK;
            local-as 65004;
            multipath;
            bfd-liveness-detection {
                minimum-interval 1000;
            }
            neighbor 10.1.4.2 {
                peer-as 65001;
            }
            neighbor 10.1.4.6 {
                peer-as 65002;
            }
        }
        group OVERLAY {
            type internal;
            multihop {
                ttl 2;
            }
            local-address 10.1.0.4;
            family evpn {
                signaling;
            }
            local-as 65000;
            neighbor 10.1.0.1;
            neighbor 10.1.0.2;
        }
    }
}
