system {
    host-name dc1-spine2;
    root-authentication {
        encrypted-password "$6$evpnlab1$x/0MmAitK3rDmZWPb.mNqW4YglzhbN5D0g0aGRtoWAaSUUMM1Om/FGfcPT3nmCP26uu2srtayTb46F1Id6Z/x.";
    }
    login {
        user admin {
            uid 2000;
            class super-user;
            authentication {
                encrypted-password "$6$evpnlab1$x/0MmAitK3rDmZWPb.mNqW4YglzhbN5D0g0aGRtoWAaSUUMM1Om/FGfcPT3nmCP26uu2srtayTb46F1Id6Z/x.";
            }
        }
    }
    services {
        ssh {
            root-login allow;
        }
        netconf {
            ssh;
        }
    }
    management-instance;
}
chassis {
    aggregated-devices {
        ethernet {
            device-count 48;
        }
    }
    fpc 0 {
        pic 0 {
            number-of-ports 56;
        }
    }
}
interfaces {
    ge-0/0/0 {
        description "to dc1-leaf1";
        mtu 9192;
        unit 0 {
            family inet {
                address 10.1.4.4/31;
            }
        }
    }
    ge-0/0/1 {
        description "to dc1-leaf2";
        mtu 9192;
        unit 0 {
            family inet {
                address 10.1.4.6/31;
            }
        }
    }
    fxp0 {
        unit 0 {
            family inet {
                address 10.0.0.15/24;
            }
            family inet6 {
                address 2001:db8::2/64;
            }
        }
    }
    lo0 {
        unit 1 {
            description Router-ID;
            family inet {
                address 10.1.0.2/32;
            }
        }
    }
}
policy-options {
    policy-statement EXPORT-LOOPBACK {
        term local-loopback {
            from interface lo0.1;
            then accept;
        }
        term bgp-loopbacks {
            from {
                protocol bgp;
                route-filter 10.1.0.0/24 prefix-length-range /32-/32;
            }
            then accept;
        }
        term reject {
            then reject;
        }
    }
    policy-statement LOAD-BALANCE {
        then {
            load-balance per-packet;
        }
    }
}
routing-instances {
    mgmt_junos {
        routing-options {
            rib mgmt_junos.inet6.0 {
                static {
                    route ::/0 next-hop 2001:db8::1;
                }
            }
            static {
                route 0.0.0.0/0 next-hop 10.0.0.2;
            }
        }
    }
}
routing-options {
    router-id 10.1.0.2;
    graceful-restart;
    forwarding-table {
        export LOAD-BALANCE;
        chained-composite-next-hop {
            ingress {
                evpn;
            }
        }
    }
}
protocols {
    bgp {
        group UNDERLAY {
            type external;
            hold-time 30;
            family inet {
                unicast;
            }
            export EXPORT-LOOPBACK;
            local-as 65002;
            multipath {
                multiple-as;
            }
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
                session-mode single-hop;
            }
            neighbor 10.1.4.5 {
                peer-as 65003;
            }
            neighbor 10.1.4.7 {
                peer-as 65004;
            }
        }
        group OVERLAY {
            type internal;
            multihop {
                ttl 2;
                no-nexthop-change;
            }
            local-address 10.1.0.2;
            hold-time 30;
            family evpn {
                signaling {
                    loops 2;
                }
            }
            cluster 10.1.0.2;
            local-as 65000;
            bfd-liveness-detection {
                minimum-interval 1000;
                multiplier 3;
                session-mode automatic;
            }
            neighbor 10.1.0.3;
            neighbor 10.1.0.4;
        }
        mtu-discovery;
        log-updown;
        graceful-restart {
            dont-help-shared-fate-bfd-down;
        }
    }
    lldp {
        port-id-subtype interface-name;
        interface all;
    }
}
