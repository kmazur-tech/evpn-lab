[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --strict-markers --tb=short
# Silence deprecation warnings from third-party libraries we don't
# control. Our own code uses passlib (not stdlib crypt directly) but
# passlib's os_crypt backend imports stdlib crypt at module load time
# which we cannot prevent until Python 3.13 ships and passlib drops
# the os_crypt backend. The pyparsing warning comes from junos-eznc
# (PyEZ). Both will resolve when the venv upgrades to Python 3.13+.
filterwarnings =
    ignore::DeprecationWarning:passlib
    ignore::DeprecationWarning:crypt
    ignore:.*setParseAction.*:DeprecationWarning
    ignore:.*setParseAction.*
