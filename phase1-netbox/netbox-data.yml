# NetBox population data - EVPN-VXLAN DC Fabric Lab
# This file contains all Phase 1 objects for populate.py (Steps 1-13).
# Environment-specific values use $VARIABLE placeholders, resolved from
# environment variables at runtime. See .env.example in repo root.

# ---------------------------------------------------------------------------
# Step 1 - Custom Fields
# ---------------------------------------------------------------------------
custom_fields:
  - name: vni
    content_types: ["ipam.vlan"]
    type: integer
    description: "VXLAN Network Identifier mapped to this VLAN"

  - name: l3vni
    content_types: ["ipam.vrf"]
    type: integer
    description: "L3 VNI for symmetric IRB routing"

  - name: esi
    content_types: ["dcim.interface"]
    type: text
    description: "Ethernet Segment Identifier (10-byte, colon-separated)"

  - name: anycast_mac
    content_types: ["ipam.vrf"]
    type: text
    description: "Shared anycast gateway MAC per VRF"

  - name: tenant_id
    content_types: ["ipam.vrf"]
    type: integer
    description: "Sequential tenant identifier (1, 2, ...). Used to encode the L2 MAC-VRF route-distinguisher as <router_id>:<tenant_id> in Phase 3 templates. The L3 VRF RD uses the L3VNI directly."

  - name: mgmt_gw_v4
    content_types: ["dcim.site"]
    type: text
    description: "Site OOB management default gateway (IPv4). Used by Phase 3 templates to render mgmt_junos static route 0.0.0.0/0."

  - name: mgmt_gw_v6
    content_types: ["dcim.site"]
    type: text
    description: "Site OOB management default gateway (IPv6). Used by Phase 3 templates to render mgmt_junos static route ::/0."

# ---------------------------------------------------------------------------
# Step 2 - Tags
# ---------------------------------------------------------------------------
tags:
  - { name: Spine,      slug: spine,      color: "2196f3", description: "Spine-layer device" }
  - { name: Leaf,       slug: leaf,       color: "4caf50", description: "Leaf-layer device" }
  - { name: Underlay,   slug: underlay,   color: "00bcd4", description: "Underlay network (eBGP, P2P)" }
  - { name: Overlay,    slug: overlay,    color: "9c27b0", description: "Overlay network (EVPN, VXLAN)" }
  - { name: ESI-LAG,    slug: esi-lag,    color: "009688", description: "ESI-LAG multihomed interface" }
  - { name: Anycast-GW, slug: anycast-gw, color: "ffeb3b", description: "Anycast gateway IRB" }
  - { name: Management, slug: mgmt,       color: "9e9e9e", description: "Management network" }
  - { name: P2P,        slug: p2p,        color: "00bcd4", description: "Point-to-point link" }
  - { name: Loopback,   slug: loopback,   color: "3f51b5", description: "Loopback interface" }
  - { name: DC1,        slug: dc1,        color: "1565c0", description: "Data Center 1 (Juniper)" }
  - { name: DC2,        slug: dc2,        color: "2e7d32", description: "Data Center 2 (Arista, project Phase 10)" }
  - { name: Suzieq,     slug: suzieq,     color: "ff9800", description: "Polled by Suzieq (Phase 5 operational state monitor)" }

# ---------------------------------------------------------------------------
# Step 3 - Regions, Tenant Groups, Tenants
# ---------------------------------------------------------------------------
regions:
  - name: Lab
    children:
      - name: DC1
      - name: DC2

tenant_groups:
  - name: Lab

tenants:
  - name: Lab Operations
    group: Lab
    description: "Owner of all lab devices"

# ---------------------------------------------------------------------------
# Step 4 - Sites
# ---------------------------------------------------------------------------
sites:
  - name: DC1
    slug: dc1
    region: DC1
    status: active
    tenant: Lab Operations
    description: "Primary DC - Juniper fabric"
    custom_fields:
      mgmt_gw_v4: "10.0.0.2"
      mgmt_gw_v6: "2001:db8::1"

# ---------------------------------------------------------------------------
# Step 5 - Manufacturers, Platforms, Device Roles
# ---------------------------------------------------------------------------
manufacturers:
  - { name: Juniper Networks, slug: juniper }
  - { name: Arista Networks,  slug: arista }
  - { name: Linux,            slug: linux }

platforms:
  - { name: Junos, slug: junos, manufacturer: Juniper Networks, napalm_driver: junos, description: "Juniper JunOS" }
  - { name: EOS,   slug: eos,   manufacturer: Arista Networks,  napalm_driver: eos,   description: "Arista EOS (project Phase 10)" }
  - { name: Linux, slug: linux, manufacturer: Linux,            description: "Linux container host" }

device_roles:
  - { name: Spine,  slug: spine,  color: "2196f3", description: "Spine / aggregation layer" }
  - { name: Leaf,   slug: leaf,   color: "4caf50", description: "Leaf / access layer (ToR)" }
  - { name: Server, slug: server, color: "009688", description: "Compute / test host" }

# ---------------------------------------------------------------------------
# Step 6 - Device Types
# ---------------------------------------------------------------------------
device_types:
  - name: EX9214
    slug: ex9214
    manufacturer: Juniper Networks
    u_height: 1  # Real: 16U, set to 1 for lab (fit in single 42U rack)
    is_full_depth: true
    description: "vjunos-switch emulates EX9214 (SMBIOS VM-VEX)"
    interface_templates:
      - { name: fxp0,      type: 1000base-t,   mgmt_only: true,  description: Management }
      - { name: ge-0/0/0,  type: 10gbase-x-sfpp, mgmt_only: false }
      - { name: ge-0/0/1,  type: 10gbase-x-sfpp, mgmt_only: false }
      - { name: ge-0/0/2,  type: 10gbase-x-sfpp, mgmt_only: false }
      - { name: ge-0/0/3,  type: 10gbase-x-sfpp, mgmt_only: false }
      - { name: ge-0/0/4,  type: 10gbase-x-sfpp, mgmt_only: false }
      - { name: ge-0/0/5,  type: 10gbase-x-sfpp, mgmt_only: false }
      - { name: lo0.1,     type: virtual,        mgmt_only: false, description: Loopback }

  - name: Container Host
    slug: container-host
    manufacturer: Linux
    u_height: 0
    is_full_depth: false
    description: "Linux container test host"
    interface_templates:
      - { name: eth0,  type: 1000base-t, mgmt_only: false }
      - { name: eth1,  type: 1000base-t, mgmt_only: false }
      - { name: bond0, type: lag,        mgmt_only: false }

# ---------------------------------------------------------------------------
# Step 7 - RIR, ASN Ranges, ASNs
# ---------------------------------------------------------------------------
rirs:
  - { name: Private, slug: private, is_private: true }

asn_ranges:
  - { name: Lab ASN Range, rir: Private, start: 64512, end: 65534 }

asns:
  - { asn: 65000, description: "iBGP overlay (EVPN signaling) - shared by all fabric devices" }
  - { asn: 65001, description: "eBGP underlay - dc1-spine1" }
  - { asn: 65002, description: "eBGP underlay - dc1-spine2" }
  - { asn: 65003, description: "eBGP underlay - dc1-leaf1" }
  - { asn: 65004, description: "eBGP underlay - dc1-leaf2" }

# ---------------------------------------------------------------------------
# Step 8 - VRFs, Route Targets, Prefix/VLAN Roles
# ---------------------------------------------------------------------------
vrfs:
  - name: TENANT-1
    rd: auto
    tenant: Lab Operations
    description: "Tenant VRF (symmetric IRB). L3 VRF; the matching L2 MAC-VRF is modeled as an L2VPN object below sharing the same RT."
    custom_fields:
      l3vni: 5000
      tenant_id: 1
      anycast_mac: "00:00:5e:00:01:01"
    import_targets: ["65000:5000"]
    export_targets: ["65000:5000"]

# Route target scheme (Option C - tenant-id encoding):
#   - One extended community per tenant: target:<overlay_asn>:<L3VNI>
#   - L3VNIs allocated from the 5000-5999 range, one per tenant
#   - Tenant 1 = L3VNI 5000 = community target:65000:5000
#   - Both the L3 VRF and the L2 MAC-VRF for the same tenant share the
#     same RT. They are different routing instance types in Junos but
#     they belong to the same logical tenant.
#
# Route distinguisher scheme:
#   - L3 VRF: <router_id>:<L3VNI>             (e.g. 10.1.0.3:5000)
#   - L2 MAC-VRF: <router_id>:<tenant_id>     (e.g. 10.1.0.3:1)
#     Junos rejects duplicate RDs across instances on one device, so
#     L2 uses the small tenant_id namespace and L3 uses the L3VNI.
route_targets:
  - { name: "65000:5000", description: "TENANT-1 (L3VNI 5000) - shared by L3 VRF and L2 MAC-VRF" }

# ---------------------------------------------------------------------------
# Step 8b - L2VPN (EVPN MAC-VRF instance)
# ---------------------------------------------------------------------------
# NetBox L2VPN object models the EVPN MAC-VRF. One L2VPN per tenant carries
# all of that tenant's L2 VNIs (vlan-aware service-type). Phase 3 Nornir
# templates render this into a routing-instances <name> { instance-type
# mac-vrf } block on each leaf, with the import/export RTs and per-VLAN
# vxlan VNI bindings.
l2vpns:
  - name: EVPN-VXLAN-TENANT-1
    slug: evpn-vxlan-tenant-1
    type: vxlan-evpn          # NetBox 4.x value for EVPN-VXLAN MAC-VRF
    identifier: 5000           # convention: same numeric ID as the L3VNI for cross-reference
    tenant: Lab Operations
    description: "L2 MAC-VRF for tenant 1, vlan-aware. Carries VNIs 10010 (VLAN10) and 10020 (VLAN20)."
    import_targets: ["65000:5000"]
    export_targets: ["65000:5000"]

roles:
  - { name: Loopback,       slug: loopback,   description: "Router-ID and VTEP loopbacks" }
  - { name: P2P Link,       slug: p2p-link,   description: "Point-to-point inter-switch links" }
  - { name: Management,     slug: management, description: "OOB management network" }
  - { name: Server,         slug: server,     description: "Server/host/tenant subnets" }
  - { name: VXLAN,          slug: vxlan,       description: "VXLAN-extended L2 segments" }

# ---------------------------------------------------------------------------
# Step 9 - Aggregates, Prefixes
# ---------------------------------------------------------------------------
aggregates:
  - { prefix: "10.0.0.0/8",     rir: Private, description: "Lab address space" }
  - { prefix: "172.16.0.0/12",  rir: Private, description: "Management address space (env-specific)" }

prefixes:
  # Management
  - prefix: "$MGMT_SUBNET"
    role: Management
    description: "Lab management network"

  # Inter-DC
  - { prefix: "10.0.0.0/24", role: P2P Link, description: "Inter-DC P2P links (Phase 10)" }

  # DC1 infrastructure
  - { prefix: "10.1.0.0/16",  site: DC1, description: "DC1 infrastructure supernet" }
  - { prefix: "10.1.0.0/22",  site: DC1, role: Loopback, description: "DC1 loopbacks (all instances)" }
  - { prefix: "10.1.0.0/24",  site: DC1, role: Loopback, description: "DC1 loopbacks, default instance" }
  - { prefix: "10.1.1.0/24",  site: DC1, role: Loopback, description: "DC1 loopbacks, VRF TENANT-1" }
  - { prefix: "10.1.4.0/24",  site: DC1, role: P2P Link, description: "DC1 spine-leaf P2P links" }
  - { prefix: "10.1.4.0/31",  site: DC1, role: P2P Link, description: "spine1 - leaf1" }
  - { prefix: "10.1.4.2/31",  site: DC1, role: P2P Link, description: "spine1 - leaf2" }
  - { prefix: "10.1.4.4/31",  site: DC1, role: P2P Link, description: "spine2 - leaf1" }
  - { prefix: "10.1.4.6/31",  site: DC1, role: P2P Link, description: "spine2 - leaf2" }

  # Tenant subnets (stretched across DCs)
  - { prefix: "10.10.0.0/16", description: "Tenant supernet (stretched across DCs)" }
  - { prefix: "10.10.10.0/24", vrf: TENANT-1, role: Server, tenant: Lab Operations, description: "VLAN 10 - Server subnet 1" }
  - { prefix: "10.10.20.0/24", vrf: TENANT-1, role: Server, tenant: Lab Operations, description: "VLAN 20 - Server subnet 2" }

  # DC1 local tenants
  - { prefix: "10.11.0.0/16", site: DC1, description: "DC1 local tenant supernet" }

# ---------------------------------------------------------------------------
# Step 10 - VLAN Groups, VLANs
# ---------------------------------------------------------------------------
vlan_groups:
  - name: DC1-VLANs
    scope_type: dcim.site
    scope: DC1
    description: "DC1 VLAN namespace"

vlans:
  # VLAN names match the Junos config artifact (VLAN<vid>), not a
  # descriptive label. The description field carries the human meaning.
  - { vid: 10, name: VLAN10, group: DC1-VLANs, status: active, role: VXLAN, custom_fields: { vni: 10010 }, description: "Server subnet 1" }
  - { vid: 20, name: VLAN20, group: DC1-VLANs, status: active, role: VXLAN, custom_fields: { vni: 10020 }, description: "Server subnet 2" }

# ---------------------------------------------------------------------------
# Step 11 - Devices
# ASNs stored in local_context_data, mgmt (OOB) IPs from env vars.
# primary_ip4 is set to loopback (lo0), not fxp0.
# ---------------------------------------------------------------------------
devices:
  - name: dc1-spine1
    device_type: EX9214
    role: Spine
    site: DC1
    platform: Junos
    status: active
    asn: 65001
    oob_ip: "$MGMT_dc1_spine1"
    tags: [spine, dc1, suzieq]

  - name: dc1-spine2
    device_type: EX9214
    role: Spine
    site: DC1
    platform: Junos
    status: active
    asn: 65002
    oob_ip: "$MGMT_dc1_spine2"
    tags: [spine, dc1, suzieq]

  - name: dc1-leaf1
    device_type: EX9214
    role: Leaf
    site: DC1
    platform: Junos
    status: active
    asn: 65003
    oob_ip: "$MGMT_dc1_leaf1"
    tags: [leaf, dc1, suzieq]

  - name: dc1-leaf2
    device_type: EX9214
    role: Leaf
    site: DC1
    platform: Junos
    status: active
    asn: 65004
    oob_ip: "$MGMT_dc1_leaf2"
    tags: [leaf, dc1, suzieq]

  - name: dc1-host1
    device_type: Container Host
    role: Server
    site: DC1
    platform: Linux
    status: active
    description: "Single-homed to dc1-leaf1"
    tags: [dc1]

  - name: dc1-host2
    device_type: Container Host
    role: Server
    site: DC1
    platform: Linux
    status: active
    description: "Single-homed to dc1-leaf2"
    tags: [dc1]

  - name: dc1-host3
    device_type: Container Host
    role: Server
    site: DC1
    platform: Linux
    status: active
    description: "Dual-homed ESI-LAG to both leaves"
    tags: [dc1]

  - name: dc1-host4
    device_type: Container Host
    role: Server
    site: DC1
    platform: Linux
    status: active
    description: "Dual-homed ESI-LAG to both leaves"
    tags: [dc1]

# ---------------------------------------------------------------------------
# Step 12 - IP Addresses
# Interfaces are auto-created from device type templates.
# Loopback IPs are set as primary_ip4. OOB IPs on fxp0 are set as oob_ip.
# ---------------------------------------------------------------------------
loopback_ips:
  # lo0.1 - default instance: router-ID, VTEP source
  - { device: dc1-spine1, interface: lo0.1, ip: "10.1.0.1/32", description: Router-ID, primary: true }
  - { device: dc1-spine2, interface: lo0.1, ip: "10.1.0.2/32", description: Router-ID, primary: true }
  - { device: dc1-leaf1,  interface: lo0.1, ip: "10.1.0.3/32", description: "Router-ID / VTEP", primary: true }
  - { device: dc1-leaf2,  interface: lo0.1, ip: "10.1.0.4/32", description: "Router-ID / VTEP", primary: true }
  # lo0.2 - VRF TENANT-1: needed for EVPN Type-5 route advertisement (Phase 2)
  - { device: dc1-leaf1,  interface: lo0.2, ip: "10.1.1.3/32", vrf: TENANT-1, description: "VRF TENANT-1 loopback", create_interface: true }
  - { device: dc1-leaf2,  interface: lo0.2, ip: "10.1.1.4/32", vrf: TENANT-1, description: "VRF TENANT-1 loopback", create_interface: true }

p2p_links:
  - a_device: dc1-spine1
    a_interface: ge-0/0/0
    a_ip: "10.1.4.0/31"
    z_device: dc1-leaf1
    z_interface: ge-0/0/0
    z_ip: "10.1.4.1/31"

  - a_device: dc1-spine1
    a_interface: ge-0/0/1
    a_ip: "10.1.4.2/31"
    z_device: dc1-leaf2
    z_interface: ge-0/0/0
    z_ip: "10.1.4.3/31"

  - a_device: dc1-spine2
    a_interface: ge-0/0/0
    a_ip: "10.1.4.4/31"
    z_device: dc1-leaf1
    z_interface: ge-0/0/1
    z_ip: "10.1.4.5/31"

  - a_device: dc1-spine2
    a_interface: ge-0/0/1
    a_ip: "10.1.4.6/31"
    z_device: dc1-leaf2
    z_interface: ge-0/0/1
    z_ip: "10.1.4.7/31"

# ---------------------------------------------------------------------------
# Step 14 - LAG interfaces, access VLAN assignments, IRBs, anycast gateways,
#           L2VPN VLAN terminations
#
# Phase 3 modeling additions. Closes the gap between NetBox SoT and the
# Phase 2 hand-built configs:
#   - ae0 / ae1 LAG parents on each leaf with their physical members
#   - untagged_vlan on host-facing ports (so VLAN membership is in NetBox)
#   - irb.10 / irb.20 virtual interfaces with leaf-local /24 IPs in TENANT-1
#   - Anycast virtual-gateway IPs as IPAddress objects with role=anycast,
#     assigned to BOTH leaves' IRBs (one IPAddress row per leaf, identical
#     address). Reserves the .1 in IPAM so nothing else can take it.
#   - L2VPN VLAN terminations: bind VLAN10/VLAN20 to EVPN-VXLAN-TENANT-1
# ---------------------------------------------------------------------------
lag_interfaces:
  - { device: dc1-leaf1, name: ae0, members: [ge-0/0/3], untagged_vlan: 20, description: "ESI-LAG to dc1-host3" }
  - { device: dc1-leaf1, name: ae1, members: [ge-0/0/4], untagged_vlan: 20, description: "ESI-LAG to dc1-host4" }
  - { device: dc1-leaf2, name: ae0, members: [ge-0/0/3], untagged_vlan: 20, description: "ESI-LAG to dc1-host3" }
  - { device: dc1-leaf2, name: ae1, members: [ge-0/0/4], untagged_vlan: 20, description: "ESI-LAG to dc1-host4" }

access_interfaces:
  - { device: dc1-leaf1, interface: "ge-0/0/2", untagged_vlan: 10 }
  - { device: dc1-leaf2, interface: "ge-0/0/2", untagged_vlan: 10 }

irb_interfaces:
  - { device: dc1-leaf1, name: irb.10, ip: "10.10.10.3/24", vrf: TENANT-1, vlan: 10, description: "IRB VLAN10 (leaf-local)" }
  - { device: dc1-leaf1, name: irb.20, ip: "10.10.20.3/24", vrf: TENANT-1, vlan: 20, description: "IRB VLAN20 (leaf-local)" }
  - { device: dc1-leaf2, name: irb.10, ip: "10.10.10.4/24", vrf: TENANT-1, vlan: 10, description: "IRB VLAN10 (leaf-local)" }
  - { device: dc1-leaf2, name: irb.20, ip: "10.10.20.4/24", vrf: TENANT-1, vlan: 20, description: "IRB VLAN20 (leaf-local)" }

anycast_gateways:
  - { vlan: 10, address: "10.10.10.1/24", vrf: TENANT-1, leaves: [dc1-leaf1, dc1-leaf2], interface: irb.10 }
  - { vlan: 20, address: "10.10.20.1/24", vrf: TENANT-1, leaves: [dc1-leaf1, dc1-leaf2], interface: irb.20 }

l2vpn_terminations:
  - { l2vpn: EVPN-VXLAN-TENANT-1, vlan: 10, vlan_group: DC1-VLANs }
  - { l2vpn: EVPN-VXLAN-TENANT-1, vlan: 20, vlan_group: DC1-VLANs }

# ---------------------------------------------------------------------------
# Step 13 - Cables
# ---------------------------------------------------------------------------
cables:
  # Spine-leaf fabric
  - { a_device: dc1-spine1, a_interface: ge-0/0/0, z_device: dc1-leaf1, z_interface: ge-0/0/0, label: sp1-lf1 }
  - { a_device: dc1-spine1, a_interface: ge-0/0/1, z_device: dc1-leaf2, z_interface: ge-0/0/0, label: sp1-lf2 }
  - { a_device: dc1-spine2, a_interface: ge-0/0/0, z_device: dc1-leaf1, z_interface: ge-0/0/1, label: sp2-lf1 }
  - { a_device: dc1-spine2, a_interface: ge-0/0/1, z_device: dc1-leaf2, z_interface: ge-0/0/1, label: sp2-lf2 }
  # Leaf-host (single-homed)
  - { a_device: dc1-leaf1, a_interface: ge-0/0/2, z_device: dc1-host1, z_interface: eth0, label: lf1-h1 }
  - { a_device: dc1-leaf2, a_interface: ge-0/0/2, z_device: dc1-host2, z_interface: eth0, label: lf2-h2 }
  # Leaf-host (dual-homed ESI-LAG)
  - { a_device: dc1-leaf1, a_interface: ge-0/0/3, z_device: dc1-host3, z_interface: eth0, label: lf1-h3 }
  - { a_device: dc1-leaf2, a_interface: ge-0/0/3, z_device: dc1-host3, z_interface: eth1, label: lf2-h3 }
  - { a_device: dc1-leaf1, a_interface: ge-0/0/4, z_device: dc1-host4, z_interface: eth0, label: lf1-h4 }
  - { a_device: dc1-leaf2, a_interface: ge-0/0/4, z_device: dc1-host4, z_interface: eth1, label: lf2-h4 }
