# Suzieq stack configuration. Shared by sq-poller, sq-coalescer, and
# sq-rest-server (all three mount this file read-only - see
# docker-compose.yml).
#
# Production-shaped from day one even though the lab uses local
# users: the AAA-protective knobs and the explicit single-worker
# sizing are set so this config can move to a real environment
# with only the credential and TLS bits to change.

data-directory: /suzieq/parquet
temp-directory: /tmp/suzieq

poller:
  logging-level: warning

  # NetBox inventory refresh cadence. Default upstream is 3600s; we
  # run faster so a device added to NetBox shows up in SuzieQ within
  # a coffee-break, slow enough not to hammer the NetBox API. Tune
  # only if NetBox starts showing rate-limit complaints.
  update-period: 600

  # Workers <= namespaces. We have one namespace (dc1), so one
  # worker. Per upstream sizing rule (~40 devices/worker), one
  # worker handles the 4 DC1 nodes with headroom to spare.
  workers: 1

  # AAA-protective knobs. Local users in the lab don't care, but
  # the values are set so a production move to RADIUS/TACACS+ does
  # not silently flood the AAA backend. See SuzieQ "Rate Limiting
  # AAA Server Requests" doc for the rationale.
  #
  # max-cmd-pipeline: how many commands the poller will pipeline
  # over a single SSH session before reconnecting. Lower = fewer
  # commands per auth event but more reconnects.
  max-cmd-pipeline: 5
  # retries-on-auth-fail: how many times the poller retries an
  # auth failure before backing off. Keep low so a real auth
  # outage does not turn into a login-storm against AAA.
  retries-on-auth-fail: 1
  # per-cmd-auth: re-auth on every command. False = reuse the
  # session (lab default, lighter on AAA). Production with TACACS+
  # command authorization may need True.
  per-cmd-auth: false

coalescer:
  # How often the coalescer compacts small parquet files into
  # larger ones. 1h is the upstream-recommended starting value
  # for a small fabric. Monitor `du -sh` on the parquet volume; if
  # the directory grows faster than expected, drop this to 30m.
  period: 1h
  # Raw uncoalesced parquet kept here as a safety net against
  # coalescer bugs (per upstream docs). Mounted as a separate
  # docker volume in docker-compose.yml so a coalescer crash can
  # be recovered from without losing history.
  archive-directory: /suzieq/archive

rest:
  # API_KEY resolved from the SUZIEQ_API_KEY env var injected by
  # docker-compose.yml. Never written to disk.
  API_KEY: env:SUZIEQ_API_KEY
  # Bind on all interfaces inside the container so the docker
  # port mapping (8443->8000) can reach it. Default upstream is
  # 127.0.0.1, which is unreachable through docker NAT.
  address: 0.0.0.0
  port: 8000
  # LAB ONLY. See README "REST TLS" banner. On this pinned digest
  # the rest server only honors `--no-https` as a CLI flag (passed
  # in docker-compose.yml `command:`), NOT as a config knob - so
  # this section deliberately does not set `no-https:` here. The
  # TLS posture is controlled in docker-compose.yml. Production
  # must set rest-keyfile/rest-certfile below AND remove the
  # --no-https flag from the rest server command line, OR front
  # this service with a TLS-terminating reverse proxy.
  # rest-keyfile: /path/to/server.key
  # rest-certfile: /path/to/server.crt
