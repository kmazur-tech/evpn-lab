[pytest]
testpaths = tests
python_files = test_*.py
# Phase A unit tests are pure-function and offline. The `live` marker
# is reserved for Part B/C/D integration tests that need NetBox or a
# running poller; default suite skips them.
addopts = -ra --strict-markers --tb=short -m "not live"
markers =
    live: tests that require NetBox + a running suzieq stack reachable on the lab mgmt segment
